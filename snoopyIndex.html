<!--Boring html stuff-->
<!DOCTYPE html>
<html>
 <head>
    <meta charset="UTF-8">
    <title> Snoopy Messages</title>
    <link rel="stylesheet" href="Background.css">
    <link rel="stylesheet" href="snoopyStyles.css">
 </head>
    <body>
        <!-- My snoopy container to contain snoopy/main popup frame-->
        <div id="snoopy-container">
            <!--snoopy/background-->
            <div id="snoopground"> 
            <div class="head"></div>
            <div class="top-head"></div>
            <div class="neck"></div>
            <div class="ears"></div>
            <div class="body"></div>
            <div class="front-leg"></div>
            <div class="front-foot"></div>
            <div class="back-foot"></div>
            <div class="back-leg"></div>
            <div class="tail"></div>
            <div class="arm"></div>
            <div class="nose"></div>
            <div class="eye-1"></div>
            <div class="eye-2"></div>
            <div class="smile"></div>
            <div class="collar"></div>
            <div class="toes"></div>
            <div class="toes-toes"></div>
            <div class="final-toe"></div>
            <div class="fingers"></div>
            <div class="spot"></div>
            </div>
        </div>
            
            <!--Message bubble-->
            <div id="messages" class="messages"> Hello Snoopy! </div>

            <div id="buttons" class="buttons">
            <!--Change message /randomize butto trigger-->
            <button id="new-message" class="new-message"><div> <span>Chat!!</span></div></button>

            <!--Exit butoon-->
            <button id="exit-button" class="exit-button"><div> <span>LEAVE </span></div></button>
            </div>

            <div class="shadow"></div>

            <!------Background stuff-->
            <div class="ground"></div>
            <div class="dogHouse-Base"></div>
            <div class="dogHouse-Roof"></div>
            <div class="day-sky"></div>
            <div class="night sky"></div>
            <div></div>


            <script src="renderer.js"></script>
    </body>
</html>
